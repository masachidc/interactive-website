        </div>

    <main>
        <div class="game-container">
            <h1>Coin Toss Game</h1>
            <p class="subtitle">Choose heads or tails and test your luck!</p>
            <div class="score-board">
                <div class="score-item">
                    <div class="score-label">Wins</div>
                    <div class="score-value" id="wins">0</div>
                </div>
                <div class="score-item">
                    <div class="score-label">Losses</div>
                    <div class="score-value" id="losses">0</div>
                </div>
                <div class="score-item">
                    <div class="score-label">Total</div>
                    <div class="score-value" id="total">0</div>
                </div>
            </div>
            <div class="coin-container">
                <div class="coin" id="coin">?</div>
            </div>
            <div class="choice-buttons">
                <button class="choice-btn heads-btn" id="headsBtn">Heads</button>
                <button class="choice-btn tails-btn" id="tailsBtn">Tails</button>
            </div>
            <div class="result-message" id="resultMessage"></div>
            <button class="reset-btn" id="resetBtn">Reset Score</button>
        </div>
    </main>
