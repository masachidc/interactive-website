    <div class="main-content">
        <div class="game-container">
            <h1>Hangman</h1>
            <p class="subtitle">Guess the word by selecting letters below!</p>
            
            <div class="game-info">
                <div class="category-box" id="catagoryName">Select a category</div>
                <div class="lives-box" id="mylives">Lives: 10</div>
            </div>
            <div class="canvas-container">
                <canvas id="stickman" width="400" height="400"></canvas>
            </div>
            <div id="hold"></div>
            <div id="buttons"></div>
            <div class="clue-box" id="clue">Click "Hint" for a clue</div>
            <div class="button-container">
                <button id="hint">Hint</button>
                <button id="reset">Play Again</button>
            </div>
